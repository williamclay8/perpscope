<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PerpScope Embed Consumer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101417;
        color: #eef4ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(41, 56, 63, 0.9), rgba(16, 20, 23, 0.98)),
          #101417;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
        font-weight: 760;
      }

      p {
        max-width: 650px;
        color: #a9b8b1;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.8fr);
        gap: 16px;
      }

      .embed-stack,
      .summary {
        display: grid;
        gap: 12px;
      }

      iframe,
      .summary {
        width: 100%;
        border: 1px solid rgba(197, 214, 205, 0.16);
        border-radius: 8px;
        background: rgba(18, 25, 27, 0.72);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
      }

      iframe {
        min-height: 260px;
      }

      .summary {
        min-height: 260px;
        padding: 16px;
        align-content: start;
      }

      .summary h2 {
        margin: 0;
        font-size: 15px;
      }

      dl {
        display: grid;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 10px 12px;
        margin: 4px 0 0;
      }

      dt {
        color: #8fa09a;
        font-size: 12px;
        text-transform: uppercase;
      }

      dd {
        margin: 0;
        overflow-wrap: anywhere;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        border: 1px solid rgba(197, 214, 205, 0.16);
        border-radius: 999px;
        padding: 6px 9px;
        color: #d8e4dc;
        background: rgba(255, 255, 255, 0.04);
        font-size: 12px;
      }

      @media (max-width: 820px) {
        .grid,
        header {
          grid-template-columns: 1fr;
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>PerpScope terminal embed</h1>
          <p>Three read-only cockpit surfaces plus a parsed perpscope.export.v1 summary, ready for a terminal side rail.</p>
        </div>
      </header>

      <section class="grid">
        <div class="embed-stack">
          <iframe title="PerpScope feed health" src="../../?embed=feed"></iframe>
          <iframe title="PerpScope hot market radar" src="../../?embed=radar&amp;filter=hot"></iframe>
          <iframe title="PerpScope market risk card" src="../../?embed=market&amp;market=wif-perp"></iframe>
        </div>
        <aside class="summary" aria-live="polite">
          <h2>Export summary</h2>
          <dl id="summary">
            <dt>Status</dt>
            <dd>Loading perpscope.export.v1</dd>
          </dl>
        </aside>
      </section>
    </main>

    <script type="module">
      const response = await fetch("../perpscope-export.sample.json", { cache: "no-store" });
      const exportPayload = await response.json();

      if (exportPayload.schema !== "perpscope.export.v1") {
        throw new Error("Unexpected PerpScope export schema.");
      }

      const feed = new Map((exportPayload.feedHealth?.items || []).map((item) => [item.label, item.value]));
      const reasons = exportPayload.market?.whyHot?.reasons || [];
      const summary = document.querySelector("#summary");

      summary.innerHTML = `
        <dt>Market</dt>
        <dd>${exportPayload.market.name}</dd>
        <dt>Heat</dt>
        <dd>${exportPayload.radar.rows[0].scoreLabel}</dd>
        <dt>Feed</dt>
        <dd>${feed.get("markets")} markets, slot ${feed.get("slot")}</dd>
        <dt>Checks</dt>
        <dd>${feed.get("unit checks")} unit checks, ${feed.get("gaps")} gaps</dd>
        <dt>Safety</dt>
        <dd>${exportPayload.safety.mode}</dd>
        <dt>Why Hot</dt>
        <dd class="chips">
          ${reasons.map((reason) => `<span class="chip">${reason.label}: ${reason.value}</span>`).join("")}
        </dd>
      `;
    </script>
  </body>
</html>
