name: Publish npm adapter

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify package version
        run: node -e "const pkg=require('./packages/percolator-adapter/package.json'); if (pkg.version !== '1.1.0') throw new Error(`Expected 1.1.0, got ${pkg.version}`)"

      - name: Publish adapter
        working-directory: packages/percolator-adapter
        run: npm publish --access public --provenance
