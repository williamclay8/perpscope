name: Publish npm adapter

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup npm trusted publishing CLI
        run: npm install -g npm@11.5.1

      - name: Verify package version
        run: |
          node --version
          npm --version
          node -e "const pkg=require('./packages/percolator-adapter/package.json'); if (pkg.version !== '2.0.0') throw new Error(`Expected 2.0.0, got ${pkg.version}`)"

      - name: Publish adapter
        working-directory: packages/percolator-adapter
        env:
          NODE_AUTH_TOKEN: ""
        run: npm publish --access public --provenance
